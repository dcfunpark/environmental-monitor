<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三菱湖环境管理平台</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(180deg, #0F3460 0%, #16213E 50%, #0A192F 100%);
      min-height: 100vh;
      color: white;
    }

    .header {
      background: linear-gradient(90deg, #1A3A6C, #0F2A4D);
      border-bottom: 2px solid #2A5A9A;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #4CAF50;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .logo-text {
      font-size: 20px;
      font-weight: bold;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #4CAF50;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .logout-btn {
      background: none;
      border: none;
      color: #9CC4FF;
      cursor: pointer;
      font-size: 14px;
    }

    .logout-btn:hover {
      color: white;
    }

    .nav-tabs {
      display: flex;
      padding: 0 24px;
    }

    .nav-tab {
      padding: 12px 24px;
      background: none;
      border: none;
      color: #9CC4FF;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .nav-tab:hover {
      color: white;
    }

    .nav-tab.active {
      background: white;
      color: #1A3A6C;
      border-radius: 8px 8px 0 0;
    }

    .main-container {
      display: flex;
      height: calc(100vh - 110px);
    }

    /* 移动端站点选择下拉框 */
    .mobile-station-selector {
      display: none;
      padding: 12px 16px;
      background: rgba(42, 90, 154, 0.2);
      border-bottom: 1px solid #2A5A9A;
    }

    .mobile-station-selector label {
      display: block;
      font-size: 13px;
      color: #9CC4FF;
      margin-bottom: 8px;
    }

    .mobile-station-selector select {
      width: 100%;
      padding: 12px 16px;
      background: rgba(42, 90, 154, 0.3);
      border: 1px solid #4A90E2;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      outline: none;
    }

    .mobile-station-selector select:hover {
      background: rgba(42, 90, 154, 0.5);
    }

    .sidebar {
      width: 320px;
      border-right: 1px solid #2A5A9A;
      display: flex;
      flex-direction: column;
    }

    .panel-title {
      padding: 14px 20px;
      border-bottom: 1px solid #2A5A9A;
      font-size: 14px;
      font-weight: 600;
      color: #9CC4FF;
      border-left: 4px solid #4A90E2;
    }

    .stat-card {
      margin: 16px;
      padding: 16px;
      background: rgba(42, 90, 154, 0.2);
      border: 1px solid #2A5A9A;
      border-radius: 8px;
    }

    .stat-table {
      width: 100%;
      font-size: 14px;
    }

    .stat-table th {
      text-align: left;
      color: #9CC4FF;
      padding-bottom: 12px;
    }

    .stat-table td {
      padding: 8px 0;
      border-top: 1px solid #2A5A9A;
    }

    .stat-table td:last-child {
      text-align: right;
    }

    .station-list {
      padding: 0 16px 16px;
      overflow-y: auto;
      flex: 1;
    }

    .station-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: rgba(42, 90, 154, 0.15);
      border: 1px solid #2A5A9A;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .station-item:hover {
      background: rgba(42, 90, 154, 0.4);
      border-color: #4A90E2;
    }

    .station-item.active {
      background: rgba(74, 144, 226, 0.3);
      border-color: #4A90E2;
      box-shadow: 0 0 10px rgba(74, 144, 226, 0.3);
    }



    .station-icon {
      font-size: 18px;
    }

    .station-name {
      font-size: 14px;
    }

    .content-area {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #9CC4FF;
      border-left: 4px solid #4A90E2;
      padding-left: 10px;
    }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .data-card {
      background: linear-gradient(135deg, rgba(42, 90, 154, 0.4), rgba(26, 58, 108, 0.4));
      border: 1px solid #4A90E2;
      border-radius: 8px;
      padding: 20px;
      transition: all 0.3s;
    }

    .data-card.hidden {
      opacity: 0.5;
      background: rgba(100, 100, 100, 0.2);
    }

    .data-label {
      font-size: 14px;
      color: #9CC4FF;
      margin-bottom: 8px;
    }

    .data-value {
      font-size: 24px;
      font-weight: bold;
      color: #4ADE80;
      margin-bottom: 6px;
      transition: all 0.3s;
    }

    .data-value.hidden {
      color: #9CA3AF;
    }

    .data-standard {
      font-size: 13px;
      color: #7CB3F0;
    }

    .alarm-panel {
      background: rgba(42, 90, 154, 0.15);
      border: 1px solid #2A5A9A;
      border-radius: 8px;
      padding: 16px;
    }

    .alarm-header {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      font-size: 14px;
      color: #9CC4FF;
      margin-bottom: 8px;
    }

    .status-panel {
      width: 320px;
      border-left: 1px solid #2A5A9A;
      display: flex;
      flex-direction: column;
    }

    /* 状态模块重新布局：上方2个，下方3个 */
    .status-grid-top {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 16px 16px 8px 16px;
    }

    .status-grid-bottom {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 8px 16px 16px 16px;
    }

    .status-item {
      text-align: center;
    }

    .status-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .status-grid-bottom .status-circle {
      width: 75px;
      height: 75px;
    }

    .status-circle::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), transparent 60%);
      border-radius: 50%;
    }

    .status-circle::after {
      content: '';
      position: absolute;
      top: 15%;
      left: 15%;
      right: 15%;
      bottom: 15%;
      border: 3px solid rgba(255,255,255,0.2);
      border-radius: 50%;
    }

    /* 雷达波纹效果 */
    .status-circle .radar-wave {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      animation: radar-pulse 2s ease-out infinite;
    }

    .status-circle .radar-wave:nth-child(2) {
      animation-delay: 0.5s;
    }

    .status-circle .radar-wave:nth-child(3) {
      animation-delay: 1s;
    }

    @keyframes radar-pulse {
      0% {
        transform: scale(0.8);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    .status-circle:hover {
      transform: scale(1.08);
      box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    }

    .status-count {
      font-size: 36px;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      position: relative;
      z-index: 1;
    }

    .status-grid-bottom .status-count {
      font-size: 26px;
    }

    .status-label {
      font-size: 14px;
      font-weight: 500;
      margin-top: 4px;
      position: relative;
      z-index: 1;
      text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    .status-circle.offline {
      background: linear-gradient(135deg, #B8C4CE 0%, #8A99A8 50%, #6B7A8A 100%);
      border: 3px solid #D0D9E0;
    }

    .status-circle.normal {
      background: linear-gradient(135deg, #6BEE8A 0%, #3CD65F 50%, #22C55E 100%);
      border: 3px solid #8BFFA3;
    }

    .status-circle.warning {
      background: linear-gradient(135deg, #FFE66D 0%, #FFD43B 50%, #F59E0B 100%);
      border: 3px solid #FFF09E;
    }

    .status-circle.exceed {
      background: linear-gradient(135deg, #FF9A6B 0%, #FB713C 50%, #DC2626 100%);
      border: 3px solid #FFB89A;
    }

    .status-circle.fault {
      background: linear-gradient(135deg, #FF6B6B 0%, #EF4444 50%, #B91C1C 100%);
      border: 3px solid #FF9A9A;
    }

    /* 桌面端隐藏移动端网格 */
    .mobile-status-grid {
      display: none;
    }

    /* 报表导出模块 */
    .export-section {
      padding: 0 16px 16px 16px;
    }

    .year-selector {
      margin-bottom: 16px;
    }

    .year-selector label {
      display: block;
      font-size: 13px;
      color: #9CC4FF;
      margin-bottom: 8px;
    }

    .year-select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(42, 90, 154, 0.3);
      border: 1px solid #4A90E2;
      border-radius: 6px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }

    .year-select:hover {
      background: rgba(42, 90, 154, 0.5);
    }

    .year-select option {
      background: #1A3A6C;
      color: white;
    }

    .month-year-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .toggle-btn {
      flex: 1;
      padding: 12px;
      background: rgba(42, 90, 154, 0.2);
      border: 1px solid #2A5A9A;
      border-radius: 6px;
      color: #9CC4FF;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      position: relative;
    }

    .toggle-btn:hover {
      background: rgba(42, 90, 154, 0.4);
    }

    .toggle-btn.active {
      background: rgba(74, 144, 226, 0.4);
      border-color: #4A90E2;
      color: white;
    }

    .toggle-btn .excel-tag {
      position: absolute;
      top: 4px;
      left: 4px;
      background: #21A366;
      color: white;
      font-size: 10px;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .toggle-btn .icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }

    .month-selector {
      margin-bottom: 16px;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }

    .month-btn {
      padding: 8px;
      background: rgba(42, 90, 154, 0.2);
      border: 1px solid #2A5A9A;
      border-radius: 4px;
      color: #9CC4FF;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .month-btn:hover {
      background: rgba(42, 90, 154, 0.4);
    }

    .month-btn.active {
      background: rgba(74, 144, 226, 0.4);
      border-color: #4A90E2;
      color: white;
    }

    .export-btn-final {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #4A90E2 0%, #2A7CC7 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .export-btn-final:hover {
      background: linear-gradient(135deg, #5A9FF2 0%, #3A8CD7 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
    }

    .footer {
      text-align: center;
      padding: 12px;
      color: #7CB3F0;
      font-size: 13px;
      border-top: 1px solid #2A5A9A;
      background: rgba(10, 25, 47, 0.5);
    }

    /* 移动端适配 */
    @media (max-width: 768px) {
      .mobile-station-selector {
        display: block;
      }

      #mobile-stat-card {
        display: block !important;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #2A5A9A;
        padding-bottom: 8px;
      }

      .header-top {
        padding: 10px 16px;
      }

      .logo-text {
        font-size: 16px;
      }

      .user-info span {
        display: none;
      }

      .nav-tabs {
        padding: 0 16px;
      }

      .main-container {
        flex-direction: column;
        height: auto;
      }

      .sidebar {
        display: none;
      }

      .station-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .station-item {
        font-size: 12px;
      }

      .content-area {
        padding: 12px;
      }

      .data-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .data-card {
        padding: 12px;
      }

      .data-label {
        font-size: 13px;
        margin-bottom: 6px;
      }

      .data-value {
        font-size: 18px;
        margin-bottom: 4px;
      }

      .data-standard {
        font-size: 12px;
      }

      .status-panel {
        width: 100%;
        border-left: none;
        border-top: 1px solid #2A5A9A;
      }

      .status-grid-top,
      .status-grid-bottom {
        display: none;
      }

      /* 移动端5个球横向排列 */
      .status-panel {
        padding: 12px;
      }

      /* 移动端状态球容器 */
      .status-circle-container {
        background: rgba(42, 90, 154, 0.2);
        border: 1px solid #2A5A9A;
        border-radius: 8px;
        padding: 12px 8px;
        margin-bottom: 16px;
      }

      /* 为移动端重新组织5个球 */
      .mobile-status-grid {
        display: grid !important;
        grid-template-columns: repeat(5, 1fr);
        gap: 6px;
        padding: 0;
      }

      .mobile-status-grid .status-item {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .mobile-status-grid .status-circle {
        width: 52px !important;
        height: 52px !important;
      }

      .mobile-status-grid .status-count {
        font-size: 20px !important;
      }

      .mobile-status-grid .status-label {
        font-size: 11px !important;
        margin-top: 4px;
      }

      .month-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .month-btn {
        padding: 10px;
        font-size: 14px;
      }
    }

    @media (max-width: 480px) {
      .logo-text {
        font-size: 14px;
      }

      .logo-icon {
        width: 32px;
        height: 32px;
      }

      .user-avatar {
        width: 28px;
        height: 28px;
      }

      .logout-btn {
        font-size: 12px;
      }

      .sidebar {
        max-height: 250px;
      }

      .station-list {
        grid-template-columns: 1fr;
      }

      .content-area {
        padding: 10px;
      }

      .data-grid {
        gap: 8px;
      }

      .data-card {
        padding: 10px;
      }

      .data-label {
        font-size: 12px;
        margin-bottom: 4px;
      }

      .data-value {
        font-size: 16px;
        margin-bottom: 3px;
      }

      .data-standard {
        font-size: 11px;
      }

      .status-grid-top {
        padding: 10px;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .status-circle {
        width: 75px !important;
        height: 75px !important;
      }

      .status-count {
        font-size: 26px !important;
      }

      .status-label {
        font-size: 12px;
      }

      .status-grid-bottom {
        padding: 6px 10px 10px;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .status-grid-bottom .status-circle {
        width: 58px !important;
        height: 58px !important;
      }

      .status-grid-bottom .status-count {
        font-size: 20px !important;
      }

      .status-grid-bottom .status-label {
        font-size: 11px;
      }

      .month-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-top">
      <div class="logo-area">
        <div class="logo-icon"><img src="ZHB.jpg" alt="Logo"></div>
        <div class="logo-text">三菱湖环境管理平台</div>
      </div>
      <div class="header-right">
        <div class="user-info">
          <div class="user-avatar"><img src="ZHB.jpg" alt="Avatar"></div>
          <span>admin</span>
          <button class="logout-btn" onclick="window.location.href='login.html'">退出</button>
        </div>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active">环境监测</button>
    </div>
  </div>

  <!-- 移动端站点统计 -->
  <div class="sidebar" id="mobile-stat-card" style="display: none;">
    <div class="panel-title">监测站点统计</div>
    <div class="stat-card">
      <table class="stat-table">
        <thead>
          <tr>
            <th>序号</th>
            <th>站点类型</th>
            <th>数量</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>水环境监测</td>
            <td>10</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 移动端站点选择下拉框 -->
  <div class="mobile-station-selector">
    <label>选择监测站点</label>
    <select id="mobileStationSelect" onchange="handleMobileStationChange(this)">
    </select>
  </div>

  <div class="main-container">
    <div class="sidebar">
      <div class="panel-title">监测站点统计</div>
      <div class="stat-card">
        <table class="stat-table">
          <thead>
            <tr>
              <th>序号</th>
              <th>站点类型</th>
              <th>数量</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>水环境监测</td>
              <td>10</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="panel-title">监测站点列表</div>
      <div class="station-list" id="stationList">
      </div>
    </div>

    <div class="content-area">
      <div class="section-header">
        <div class="section-title" id="currentStationTitle">实时数据 - 三菱湖渔场1号机柜 上次更新时间: 2026-05-18 16:34:17</div>
      </div>
      <div class="data-grid" id="dataGrid">
      </div>
      <div class="section-header">
        <div class="section-title">异常数据播报(48小时)</div>
      </div>
      <div class="alarm-panel">
        <div class="alarm-header">
          <div>报警类别</div>
          <div>报警内容</div>
          <div>报警时间</div>
        </div>
      </div>
    </div>

    <div class="status-panel">
      <div class="panel-title">站点实时状态 (30s刷新一次)</div>
      
      <!-- 桌面端：上方2个下方3个 -->
      <div class="status-grid-top">
        <div class="status-item">
          <div class="status-circle offline" id="offlineCount">
            <div class="radar-wave"></div>
            <div class="radar-wave"></div>
            <div class="radar-wave"></div>
            <div class="status-count">0</div>
            <div class="status-label">离线</div>
          </div>
        </div>
        <div class="status-item">
          <div class="status-circle normal" id="normalCount">
            <div class="radar-wave"></div>
            <div class="radar-wave"></div>
            <div class="radar-wave"></div>
            <div class="status-count">9</div>
            <div class="status-label">正常</div>
          </div>
        </div>
      </div>
      
      <div class="status-grid-bottom">
        <div class="status-item">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script>
    const stations = [
      '三菱湖渔场1号机柜',
      '三菱湖渔场2号机柜',
      '三菱湖渔场3号机柜',
      '三菱湖渔场4号机柜',
      '三菱湖渔场5号机柜',
      '三菱湖渔场6号机柜',
      '三菱湖渔场7号机柜',
      '三菱湖渔场8号机柜',
      '三菱湖渔场9号机柜',
      '三菱湖渔场10号机柜'
    ];

    const dataConfig = {
      '溶解氧': { min: 3, max: 12, unit: 'mg/L' },
      '化学需氧量': { min: 0, max: 100, unit: 'mg/L', dataMin: 31, dataMax: 38 },
      '氨氮': { min: 0, max: 1, unit: 'mg/L' },
      '总磷': { min: 0, max: 1, unit: 'mg/L' }
    };

    // 离线站点：第十台机子（索引9）始终离线，再随机选择0-1个额外的离线站点
    const offlineStations = [9];
    
    let currentStationIndex = 0;
    let stationData = {};
    let warningStations = [];
    let lastWarningUpdate = null;
    let exportMode = 'month';
    let selectedMonth = new Date().getMonth() + 1;

    function generateRandomValue(min, max) {
      const val = min + Math.random() * (max - min);
      // 根据示例数据，保留适当的小数位
      if (max - min > 10) {
        return Math.round(val * 10000) / 10000; // 4位小数
      } else {
        return Math.round(val * 1000) / 1000; // 3位小数
      }
    }

    function initializeStationData() {
      stations.forEach((station, index) => {
        stationData[station] = {
          '溶解氧': generateRandomValue(3, 12),
          '化学需氧量': generateRandomValue(31, 38),
          '氨氮': generateRandomValue(0, 1),
          '总磷': generateRandomValue(0, 1)
        };
      });
    }

    function updateWarningStations() {
      const now = new Date();
      const today = now.toDateString();
      
      if (lastWarningUpdate !== today) {
        warningStations = [];
        
        // 检查每个站点是否有数据达到最大值的90%
        stations.forEach(station => {
          const stationIndex = stations.indexOf(station);
          // 跳过离线站点（只有10号机离线）
          if (offlineStations.includes(stationIndex)) return;
          
          const data = stationData[station];
          Object.keys(dataConfig).forEach(key => {
            const config = dataConfig[key];
            const value = parseFloat(data[key]);
            const threshold = config.max * 0.9;
            
            if (value >= threshold) {
              if (!warningStations.includes(station)) {
                warningStations.push(station);
              }
            }
          });
        });
        
        // 如果预警站点超过2个，只保留前2个
        if (warningStations.length > 2) {
          warningStations = warningStations.slice(0, 2);
        }
        
        // 如果没有预警站点，随机选择1-2个（确保每天至少有一些预警显示）
        if (warningStations.length === 0) {
          const randomWarningCount = Math.floor(Math.random() * 2) + 1; // 1或2
          // 从非离线站点中随机选择（只有1-9号机）
          const availableStations = stations.filter((s, i) => !offlineStations.includes(i));
          const shuffled = [...availableStations].sort(() => Math.random() - 0.5);
          warningStations = shuffled.slice(0, randomWarningCount);
        }
        
        lastWarningUpdate = today;
        
        // 离线数量：永远只有1台（10号机）
        const offlineCount = 1;
        
        // 预警数量：1-2台
        const warningCount = warningStations.length;
        
        // 正常数量：总共10 - 1离线 - 1~2预警 = 7~8台
        const normalCount = 10 - offlineCount - warningCount;
        
        // 更新状态显示
        document.getElementById('offlineCount').querySelector('.status-count').textContent = offlineCount;
        document.getElementById('normalCount').querySelector('.status-count').textContent = normalCount;
        document.getElementById('warningCount').querySelector('.status-count').textContent = warningCount;
        
        // 同步移动端状态
        const offlineCountMobile = document.getElementById('offlineCountMobile');
        const normalCountMobile = document.getElementById('normalCountMobile');
        const warningCountMobile = document.getElementById('warningCountMobile');
        
        if (offlineCountMobile) {
          offlineCountMobile.querySelector('.status-count').textContent = offlineCount;
        }
        if (normalCountMobile) {
          normalCountMobile.querySelector('.status-count').textContent = normalCount;
        }
        if (warningCountMobile) {
          warningCountMobile.querySelector('.status-count').textContent = warningCount;
        }
      }
    }

    // 初始化移动端下拉选择器
    function initMobileStationSelect() {
      const selectEl = document.getElementById('mobileStationSelect');
      selectEl.innerHTML = stations.map((station, index) => {
        return `<option value="${index}">${station}</option>`;
      }).join('');
      selectEl.value = currentStationIndex;
    }

    // 处理移动端站点选择变化
    function handleMobileStationChange(selectEl) {
      currentStationIndex = parseInt(selectEl.value);
      updateDisplay();
    }

    function renderStationList() {
      const stationListEl = document.getElementById('stationList');
      stationListEl.innerHTML = stations.map((station, index) => {
        const isActive = index === currentStationIndex;
        return `
          <div class="station-item ${isActive ? 'active' : ''}" data-index="${index}">
            <span class="station-icon">🏢</span>
            <span class="station-name">${station}</span>
          </div>
        `;
      }).join('');

      stationListEl.querySelectorAll('.station-item').forEach(item => {
        item.addEventListener('click', () => {
          currentStationIndex = parseInt(item.dataset.index);
          updateDisplay();
          renderStationList();
          // 同时更新移动端下拉选择器
          const mobileSelect = document.getElementById('mobileStationSelect');
          if (mobileSelect) {
            mobileSelect.value = currentStationIndex;
          }
        });
      });
    }

    function updateDisplay() {
      const currentStation = stations[currentStationIndex];
      const isOffline = offlineStations.includes(currentStationIndex);
      const isWarning = warningStations.includes(currentStation);
      
      const now = new Date();
      const timeStr = now.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      }).replace(/\//g, '-');

      document.getElementById('currentStationTitle').innerHTML = 
        `实时数据 - ${currentStation} 上次更新时间: ${timeStr}`;

      const dataGridEl = document.getElementById('dataGrid');
      
      if (isOffline) {
        // 离线站点显示离线信息
        dataGridEl.innerHTML = `
          <div class="data-card" style="grid-column: 1 / -1;">
            <div class="data-label">【设备状态】</div>
            <div class="data-value" style="color: #9CA3AF">设备离线</div>
            <div class="data-standard">暂无数据</div>
          </div>
        `;
      } else {
        const data = stationData[currentStation];
        dataGridEl.innerHTML = Object.keys(dataConfig).map(key => {
          const config = dataConfig[key];
          const value = parseFloat(data[key]);
          const isWarningValue = value >= config.max * 0.9;
          
          return `
            <div class="data-card">
              <div class="data-label">【${key}】</div>
              <div class="data-value" style="color: ${isWarningValue ? '#FFD43B' : '#4ADE80'}">实时数据: ${data[key]}${dataConfig[key].unit}</div>
              <div class="data-standard">排放标准: ${dataConfig[key].min} - ${dataConfig[key].max}</div>
            </div>
          `;
        }).join('');
      }
    }

    function updateAllStationData() {
      stations.forEach(station => {
        Object.keys(dataConfig).forEach(key => {
          const config = dataConfig[key];
          const currentValue = parseFloat(stationData[station][key]);
          
          // 确定实际数据波动的范围
          let minVal = config.min;
          let maxVal = config.max;
          if (key === '化学需氧量' && config.dataMin !== undefined) {
            minVal = config.dataMin;
            maxVal = config.dataMax;
          }
          
          const change = (Math.random() - 0.5) * (maxVal - minVal) * 0.1;
          let newValue = currentValue + change;
          
          if (newValue < minVal) newValue = minVal;
          if (newValue > maxVal) newValue = maxVal;
          
          stationData[station][key] = newValue.toFixed(3);
        });
      });
      updateDisplay();
    }

    // 年份选择器初始化
    function initializeYearSelector() {
      const yearSelect = document.getElementById('yearSelect');
      const currentYear = new Date().getFullYear();
      const startYear = 2020;
      
      for (let year = currentYear; year >= startYear; year--) {
        const option = document.createElement('option');
        option.value = year;
        option.textContent = year + '年';
        yearSelect.appendChild(option);
      }
    }

    // 切换月/年模式
    function setExportMode(mode) {
      exportMode = mode;
      document.getElementById('monthToggle').classList.toggle('active', mode === 'month');
      document.getElementById('yearToggle').classList.toggle('active', mode === 'year');
      document.getElementById('monthSelector').style.display = mode === 'month' ? 'block' : 'none';
    }

    // 初始化月份选择
    function initializeMonthSelector() {
      const monthBtns = document.querySelectorAll('.month-btn');
      monthBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          monthBtns.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selectedMonth = parseInt(btn.dataset.month);
        });
      });
      
      // 默认选中当前月
      const currentMonthBtn = document.querySelector(`.month-btn[data-month="${selectedMonth}"]`);
      if (currentMonthBtn) currentMonthBtn.classList.add('active');
    }

    // 判断某个站点在某个时间是否有数据空缺
    function hasDataGap(year, month, stationIndex) {
      // 检查是否是离线站点
      if (offlineStations.includes(stationIndex)) {
        return true;
      }
      
      const today = new Date();
      const earliestDate = new Date(2024, 10, 1); // 2024年11月1号（月份从0开始）
      const latestDate = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 2); // 今天往前推2天
      const targetDate = new Date(year, month - 1, 1); // 目标月份的第一天
      
      // 如果目标日期早于最早日期（2024年11月），或者晚于最晚日期（今天往前推2天），则有数据空缺
      if (targetDate < earliestDate || targetDate > latestDate) {
        return true;
      }
      
      if ((year === 2024 && month >= 11) || (year >= 2025 && year <= 2026) || (year === 2026 && month <= 4)) {
        const gapStations = [2, 5, 7]; // 随机挑选3台机子（移除9号，因为已经设为离线）
        return gapStations.includes(stationIndex);
      }
      
      return false; // 在允许范围内且不在数据空缺站点中的，正常生成数据
    }

    // 生成历史数据
    function generateHistoricalData(year, month, station, stationIndex) {
      const data = [];
      const currentDate = new Date();
      const currentYear = currentDate.getFullYear();
      const currentMonth = currentDate.getMonth() + 1;
      
      // 随机选择1-2个站点有超标数据
      const exceedStationIndices = [];
      const exceedCount = Math.floor(Math.random() * 2) + 1;
      const shuffledIndices = [...Array(10).keys()].sort(() => Math.random() - 0.5);
      for (let i = 0; i < exceedCount; i++) {
        exceedStationIndices.push(shuffledIndices[i]);
      }
      
      if (exportMode === 'month') {
        // 月度模式：只返回一条月度记录，但包含该月的数据用于计算统计值
        const isFutureDate = (year > currentYear) || (year === currentYear && month > currentMonth);
        
        if (isFutureDate || hasDataGap(year, month, stationIndex)) {
          data.push({
            '时间': `${year}-${String(month).padStart(2, '0')}`,
            '溶解氧': '-',
            '化学需氧量': '-',
            '氨氮': '-',
            '总磷': '-',
            'pH值': '-'
          });
        } else {
          const isExceedStation = exceedStationIndices.includes(stationIndex);
          const exceedParamIndex = Math.floor(Math.random() * 4);
          
          let doVal, codVal, nh3Val, tpVal;
          
          if (isExceedStation && exceedParamIndex === 0) {
            doVal = generateRandomValue(12 * 1.01, 12 * 1.2);
          } else {
            doVal = generateRandomValue(3, 12);
          }
          
          codVal = generateRandomValue(31, 38);
          
          if (isExceedStation && exceedParamIndex === 2) {
            nh3Val = generateRandomValue(1 * 1.01, 1 * 1.2);
          } else {
            nh3Val = generateRandomValue(0, 1);
          }
          
          if (isExceedStation && exceedParamIndex === 3) {
            tpVal = generateRandomValue(1 * 1.01, 1 * 1.2);
          } else {
            tpVal = generateRandomValue(0, 1);
          }
          
          data.push({
            '时间': `${year}-${String(month).padStart(2, '0')}`,
            '溶解氧': doVal,
            '化学需氧量': codVal,
            '氨氮': nh3Val,
            '总磷': tpVal,
            'pH值': '-'
          });
        }
      } else {
        // 年度模式：按月份生成
        for (let m = 1; m <= 12; m++) {
          const isFutureDate = (year > currentYear) || (year === currentYear && m > currentMonth);
          
          if (isFutureDate || hasDataGap(year, m, stationIndex)) {
            data.push({
              '时间': `${year}-${String(m).padStart(2, '0')}`,
              '溶解氧': '-',
              '化学需氧量': '-',
              '氨氮': '-',
              '总磷': '-',
              'pH值': '-'
            });
          } else {
            const isExceedStation = exceedStationIndices.includes(stationIndex);
            const exceedParamIndex = Math.floor(Math.random() * 4);
            
            let doVal, codVal, nh3Val, tpVal;
            
            if (isExceedStation && exceedParamIndex === 0) {
              doVal = generateRandomValue(12 * 1.01, 12 * 1.2);
            } else {
              doVal = generateRandomValue(3, 12);
            }
            
            codVal = generateRandomValue(31, 38);
            
            if (isExceedStation && exceedParamIndex === 2) {
              nh3Val = generateRandomValue(1 * 1.01, 1 * 1.2);
            } else {
              nh3Val = generateRandomValue(0, 1);
            }
            
            if (isExceedStation && exceedParamIndex === 3) {
              tpVal = generateRandomValue(1 * 1.01, 1 * 1.2);
            } else {
              tpVal = generateRandomValue(0, 1);
            }
            
            data.push({
              '时间': `${year}-${String(m).padStart(2, '0')}`,
              '溶解氧': doVal,
              '化学需氧量': codVal,
              '氨氮': nh3Val,
              '总磷': tpVal,
              'pH值': '-'
            });
          }
        }
      }
      
      return data;
    }

    // 计算统计数据
    function calculateStats(data) {
      const stats = {
        max: { '溶解氧': 0, '化学需氧量': 0, '氨氮': 0, '总磷': 0 },
        min: { '溶解氧': Infinity, '化学需氧量': Infinity, '氨氮': Infinity, '总磷': Infinity },
        total: { '溶解氧': 0, '化学需氧量': 0, '氨氮': 0, '总磷': 0 },
        avg: { '溶解氧': 0, '化学需氧量': 0, '氨氮': 0, '总磷': 0 },
        count: 0
      };
      
      if (exportMode === 'month' && data.length > 0 && data[0]['溶解氧'] !== '-') {
        // 月度模式：直接生成最大值、最小值和月均值
        Object.keys(stats.max).forEach(key => {
          let minVal, maxVal, avgVal;
          
          if (key === '化学需氧量') {
            minVal = Math.floor(Math.random() * 6) + 31; // 31-36
            maxVal = minVal + Math.floor(Math.random() * 3) + 1; // min+1 to min+3
            avgVal = Math.round((minVal + maxVal) / 2 * 100) / 100;
          } else if (key === '溶解氧') {
            minVal = 3 + Math.random() * 6; // 3-9
            maxVal = minVal + 1 + Math.random() * 2; // min+1 to min+3
            avgVal = Math.round((minVal + maxVal) / 2 * 10000) / 10000;
            minVal = Math.round(minVal * 10000) / 10000;
            maxVal = Math.round(maxVal * 10000) / 10000;
          } else if (key === '总磷') {
            minVal = Math.random() * 0.6; // 0-0.6
            maxVal = minVal + 0.1 + Math.random() * 0.3; // min+0.1 to min+0.4
            avgVal = Math.round((minVal + maxVal) / 2 * 1000) / 1000;
            minVal = Math.round(minVal * 1000) / 1000;
            maxVal = Math.round(maxVal * 1000) / 1000;
          } else if (key === '氨氮') {
            minVal = Math.random() * 0.6; // 0-0.6
            maxVal = minVal + 0.1 + Math.random() * 0.3; // min+0.1 to min+0.4
            avgVal = Math.round((minVal + maxVal) / 2 * 10000) / 10000;
            minVal = Math.round(minVal * 10000) / 10000;
            maxVal = Math.round(maxVal * 10000) / 10000;
          }
          
          stats.min[key] = minVal;
          stats.max[key] = maxVal;
          stats.avg[key] = avgVal;
          stats.total[key] = avgVal; // 总量也设为平均值
        });
        stats.count = 1;
      } else {
        // 年度模式：按原逻辑计算
        data.forEach(row => {
          if (row['溶解氧'] !== '-') {
            stats.count++;
            Object.keys(stats.max).forEach(key => {
              const val = parseFloat(row[key]);
              if (!isNaN(val)) {
                if (val > stats.max[key]) stats.max[key] = val;
                if (val < stats.min[key]) stats.min[key] = val;
                stats.total[key] += val;
              }
            });
          }
        });
        
        // 计算平均值
        if (stats.count > 0) {
          Object.keys(stats.avg).forEach(key => {
            stats.avg[key] = stats.total[key] / stats.count;
          });
        }
        
        // 格式化数字，匹配示例中的精度，并确保最大值大于最小值
        if (stats.count > 0) {
          Object.keys(stats.max).forEach(key => {
            // 确保最大值大于最小值
            if (stats.max[key] <= stats.min[key]) {
              // 根据不同参数类型添加增量
              if (key === '化学需氧量') {
                stats.max[key] = stats.min[key] + 2;
              } else if (key === '总磷') {
                stats.max[key] = stats.min[key] + 0.1;
              } else if (key === '氨氮') {
                stats.max[key] = stats.min[key] + 0.1;
              } else {
                stats.max[key] = stats.min[key] + 0.5;
              }
            }
            
            // 确保平均值在最大值和最小值之间
            if (stats.avg[key] <= stats.min[key] || stats.avg[key] >= stats.max[key]) {
              stats.avg[key] = (stats.min[key] + stats.max[key]) / 2;
            }
            
            if (key === '化学需氧量') {
              stats.max[key] = Math.round(stats.max[key]);
              stats.min[key] = Math.round(stats.min[key]);
              stats.avg[key] = Math.round(stats.avg[key] * 100) / 100;
              stats.total[key] = Math.round(stats.total[key] * 10000) / 10000;
            } else if (key === '总磷') {
              stats.max[key] = Math.round(stats.max[key] * 1000) / 1000;
              stats.min[key] = Math.round(stats.min[key] * 1000) / 1000;
              stats.avg[key] = Math.round(stats.avg[key] * 1000) / 1000;
              stats.total[key] = Math.round(stats.total[key] * 1000) / 1000;
            } else {
              stats.max[key] = Math.round(stats.max[key] * 10000) / 10000;
              stats.min[key] = Math.round(stats.min[key] * 10000) / 10000;
              stats.avg[key] = Math.round(stats.avg[key] * 10000) / 10000;
              stats.total[key] = Math.round(stats.total[key] * 10000) / 10000;
            }
          });
        }
      }
      
      return stats;
    }

    // 导出Excel
    function exportExcel() {
      const year = parseInt(document.getElementById('yearSelect').value);
      const currentStation = stations[currentStationIndex];
      const today = new Date();
      const earliestDate = new Date(2024, 10, 1); // 2024年11月1号（月份从0开始）
      const latestDate = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 2); // 今天往前推2天
      const targetDate = new Date(year, selectedMonth - 1, 1); // 目标月份的第一天
      
      // 检查是否是离线站点
      if (offlineStations.includes(currentStationIndex)) {
        alert('该站点离线，无法下载Excel表！');
        return;
      }
      
      // 格式化日期显示
      const formatDate = (date) => {
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}号`;
      };
      
      // 检查是否可以生成Excel
      if (targetDate < earliestDate || targetDate > latestDate) {
        alert(`只能导出${formatDate(earliestDate)}至${formatDate(latestDate)}之间的数据！`);
        return;
      }
      
      if ((year === 2024 && selectedMonth >= 11) || (year >= 2025) || (year === 2026 && selectedMonth <= 4)) {
        const gapStations = [2, 5, 7]; // 移除索引9，因为9号站点已经被设为离线站点
        if (gapStations.includes(currentStationIndex)) {
          alert('该站点在此期间无法下载Excel表！');
          return;
        }
      }
      
      // 生成数据
      const historicalData = generateHistoricalData(year, selectedMonth, currentStation, currentStationIndex);
      
      // 准备工作表数据
      const wsData = [];
      
      // 表头1：企业名称和站点名称
      wsData.push(['企业名称：三菱湖渔场', '', '', '站点名称：' + currentStation]);
      
      // 表头2：监测时间
      const timeLabel = exportMode === 'month' 
        ? `监测时间：${year}年${selectedMonth}月 - ${year}年${selectedMonth}月` 
        : `监测时间：${year}年1月 - ${year}年12月`;
      wsData.push([timeLabel, '', '', 'MN号：SHJCEB000005']);
      
      // 表头3：第一行 - 指标名称
      wsData.push(['时间', '溶解氧', '化学需氧量', '氨氮', '总磷', 'PH值']);
      
      // 表头4：第二行 - 单位
      wsData.push(['', '实测(mg/L)', '实测(mg/L)', '实测(mg/L)', '实测(mg/L)', '无量纲']);
      
      // 统计行
      const stats = calculateStats(historicalData);
      if (stats.count > 0) {
        if (exportMode === 'month') {
          // 月度模式：只有最大值、最小值、月均值，没有单日数据
          wsData.push(['最大值', stats.max['溶解氧'], stats.max['化学需氧量'], stats.max['氨氮'], stats.max['总磷'], '-']);
          wsData.push(['最小值', stats.min['溶解氧'], stats.min['化学需氧量'], stats.min['氨氮'], stats.min['总磷'], '-']);
          wsData.push(['月均值', stats.avg['溶解氧'], stats.avg['化学需氧量'], stats.avg['氨氮'], stats.avg['总磷'], '-']);
        } else {
          // 年度模式：保留月份数据和统计
          historicalData.forEach(row => {
            wsData.push([
              row['时间'],
              row['溶解氧'],
              row['化学需氧量'],
              row['氨氮'],
              row['总磷'],
              row['pH值']
            ]);
          });
          wsData.push(['最大值', stats.max['溶解氧'], stats.max['化学需氧量'], stats.max['氨氮'], stats.max['总磷'], '-']);
          wsData.push(['最小值', stats.min['溶解氧'], stats.min['化学需氧量'], stats.min['氨氮'], stats.min['总磷'], '-']);
          wsData.push(['总量', stats.total['溶解氧'], stats.total['化学需氧量'], stats.total['氨氮'], stats.total['总磷'], '-']);
        }
      }
      
      // 创建工作簿
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      
      // 设置合并单元格（完全匹配示例格式）
      ws['!merges'] = [
        // 第1行：企业名称和站点名称合并
        { s: { c: 0, r: 0 }, e: { c: 2, r: 0 } },
        { s: { c: 3, r: 0 }, e: { c: 5, r: 0 } },
        // 第2行：监测时间和MN号合并
        { s: { c: 0, r: 1 }, e: { c: 2, r: 1 } },
        { s: { c: 3, r: 1 }, e: { c: 5, r: 1 } },
        // 第3-4行：时间和PH值列合并
        { s: { c: 0, r: 2 }, e: { c: 0, r: 3 } },
        { s: { c: 5, r: 2 }, e: { c: 5, r: 3 } }
      ];
      
      // 设置列宽
      ws['!cols'] = [
        { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 8 }
      ];
      
      const sheetName = exportMode === 'month' 
        ? `${year}年${selectedMonth}月 - ${year}年${selectedMonth}月月度监测报表` 
        : `${year}年1月 - ${year}年12月月度监测报表`;
      
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      
      // 导出文件
      const fileName = exportMode === 'month' 
        ? `${currentStation} - ${year}年月度监测报表.xlsx` 
        : `${currentStation} - ${year}年月度监测报表.xlsx`;
      
      XLSX.writeFile(wb, fileName);
    }

    initializeStationData();
    updateWarningStations();
    renderStationList();
    updateDisplay();
    initializeYearSelector();
    initializeMonthSelector();
    initMobileStationSelect();

    setInterval(updateAllStationData, 86400000);
    setInterval(updateWarningStations, 86400000);
  </script>
</body>
